<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vinomial | Home</title>
  <meta name="description" content="Vinomial の個人ホームページ。プロフィール、ブログ、アカウントへのリンクをまとめています。">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body data-page="home">
  <div class="page-shell">
    <header class="site-header">
      <a href="index.html" class="brand-mark">Vinomial</a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="index.html" data-nav="home">Home</a>
        <a href="blog.html" data-nav="blog">Blog</a>
      </nav>
    </header>

    <main>
      <section class="hero-panel">
        <div class="hero-heading">
          <p class="eyebrow">Personal Homepage</p>
          <h1>Vinomialのホームページ</h1>
          <p class="hero-lead">
            物忘れが激しく，日々の記録を残したいのでホームページを作りました
          </p>
        </div>
        <div class="hero-visual">
          <div class="icon-frame">
            <img src="images/icon.png" alt="Vinomial のアイコン" class="home-icon">
          </div>
        </div>
        <article class="hero-profile" id="profile">
          <p class="section-kicker">Profile</p>
          <h2>自己紹介</h2>
          <p>
            東京と埼玉にキャンパスがある大学に通っている大学3年生です
          </p>
        </article>
      </section>

      <section class="content-grid">
        <article class="card wide-card">
          <p class="section-kicker">Blog</p>
          <h2>ブログ</h2>
          <p>
            競技プログラミングのコンテストの感想などを書きます
          </p>
          <a href="blog.html" class="inline-link">記事一覧へ</a>
        </article>
      </section>

      <section class="card account-card" id="accounts">
        <div class="section-heading">
          <div>
            <p class="section-kicker">Accounts</p>
            <h2>アカウント</h2>
          </div>
          <p class="section-note">他にあれば追加していきます</p>
        </div>
        <div class="account-links">
          <a href="https://x.com/Majmahc_0718" target="_blank" rel="noopener noreferrer" class="account-link">
            <img src="images/X.png" alt="" class="account-icon">
            <span>X</span>
          </a>
          <a href="https://github.com/Binomial58" target="_blank" rel="noopener noreferrer" class="account-link">
            <img src="images/Github.png" alt="" class="account-icon">
            <span>GitHub</span>
          </a>
          <a href="https://atcoder.jp/users/Binomial" target="_blank" rel="noopener noreferrer" class="account-link">
            <img src="images/Atcoder.png" alt="" class="account-icon">
            <span>AtCoder</span>
          </a>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p class="copyright">© <span data-year></span> Vinomial</p>
      <p class="site-credit">Static site hosted on Vercel.</p>
    </footer>
  </div>

  <script src="assets/js/main.js"></script>
</body>

</html>
